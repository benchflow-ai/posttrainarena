name: benchflow-posttrain-pipeline

on:
  pull_request:
    paths:
      - "pipelines/benchflow-task-posttrain/**"
      - "docs/training-pipeline.md"
      - "docs/architecture-status.md"
      - "docs/hf-jobs.md"
      - "docs/hf-jobs-validation.md"
      - "docs/opencode-grpo.md"
      - "docs/opencode-grpo-smoke.md"
      - "docs/README.md"
      - "README.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "CODE_OF_CONDUCT.md"
      - ".github/pull_request_template.md"
      - ".github/workflows/benchflow-posttrain-pipeline.yml"
  push:
    branches: [main]
    paths:
      - "pipelines/benchflow-task-posttrain/**"
      - "docs/training-pipeline.md"
      - "docs/architecture-status.md"
      - "docs/hf-jobs.md"
      - "docs/hf-jobs-validation.md"
      - "docs/opencode-grpo.md"
      - "docs/opencode-grpo-smoke.md"
      - "docs/README.md"
      - "README.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "CODE_OF_CONDUCT.md"
      - ".github/pull_request_template.md"
      - ".github/workflows/benchflow-posttrain-pipeline.yml"

concurrency:
  group: benchflow-posttrain-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package and test dependencies
        run: pip install -e 'pipelines/benchflow-task-posttrain[test]'
      - name: Compile
        run: >-
          python -m py_compile
          pipelines/benchflow-task-posttrain/src/posttrainarena/benchflow_pipeline/*.py
          pipelines/benchflow-task-posttrain/src/posttrainarena/benchflow_pipeline/openenv/*.py
          pipelines/benchflow-task-posttrain/src/posttrainarena/benchflow_pipeline/jobs/*.py
      - name: Test no-spend contracts
        run: python -m pytest pipelines/benchflow-task-posttrain/tests -q
      - name: Exercise documented CLI
        working-directory: pipelines/benchflow-task-posttrain
        run: |
          posttrainarena-train validate --config configs/qwen3-4b-data-agent-smoke.toml
          posttrainarena-train validate \
            --config configs/qwen3-4b-data-agent-forced-grpo-smoke.toml
          posttrainarena-train validate \
            --config configs/qwen3-4b-hf-job-smoke.toml
          posttrainarena-train validate \
            --config configs/qwen3-4b-skillsbench-e2e-smoke.toml
          posttrainarena-train plan \
            --config configs/qwen3-4b-data-agent-forced-grpo-smoke.toml \
            --run-name ci-plan > /tmp/posttrainarena-plan.json
          posttrainarena-train run \
            --config configs/qwen3-4b-data-agent-forced-grpo-smoke.toml \
            --run-name ci-dry-run \
            --dry-run > /tmp/posttrainarena-run.json
          python - <<'PY'
          import json
          from pathlib import Path

          plan = json.loads(Path("/tmp/posttrainarena-plan.json").read_text())
          run = json.loads(Path("/tmp/posttrainarena-run.json").read_text())
          assert plan["train_task_count"] == 15
          assert plan["eval_task_count"] == 2
          assert plan["harness_migration"]["applied_stages"] == [
              "teacher",
              "evaluation",
              "grpo",
          ]
          assert plan["harness_migration"]["pending_stages"] == []
          assert plan["grpo"]["run_policy"] == "always"
          assert run["grpo_run_policy"] == "always"
          assert run["grpo_planned"] is True
          assert run["grpo_ran"] is False
          PY
          posttrainarena-train hf-job-submit \
            --config configs/qwen3-4b-hf-job-smoke.toml \
            --benchmarks configs/multi-benchmark-smoke.toml \
            --bundle-dir /tmp/posttrainarena-job-bundle \
            --run-id ci-job-plan \
            --submission-id organizer-smoke \
            --team-name Organizers \
            --artifact-repo benchflow/posttrainarena-results \
            --leaderboard-repo benchflow/posttrainarena-leaderboard \
            --flavor cpu-basic \
            --pipeline-dry-run \
            --launcher-dry-run > /tmp/posttrainarena-job-plan.json
          python - <<'PY'
          import json
          from pathlib import Path

          plan = json.loads(Path("/tmp/posttrainarena-job-plan.json").read_text())
          assert plan["posttrainarena_ref"]
          assert plan["secret_names"] == ["HF_TOKEN"]
          assert plan["submitted"] is False
          bundle = Path(plan["bundle_dir"])
          assert (bundle / "config.toml").is_file()
          assert (bundle / "benchmarks.toml").is_file()
          PY
