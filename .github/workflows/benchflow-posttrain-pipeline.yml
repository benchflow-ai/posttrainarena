name: benchflow-posttrain-pipeline

on:
  pull_request:
    paths:
      - "pipelines/benchflow-task-posttrain/**"
      - "docs/training-pipeline.md"
      - "docs/architecture-status.md"
      - "docs/hf-jobs.md"
      - "docs/hf-jobs-validation.md"
      - "docs/opencode-grpo.md"
      - "docs/opencode-grpo-smoke.md"
      - "docs/qwen35-opencode-teacher-canary.md"
      - "docs/qwen35-data-agent-e2e-canary.md"
      - "docs/README.md"
      - "README.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "CODE_OF_CONDUCT.md"
      - ".github/pull_request_template.md"
      - ".github/workflows/benchflow-posttrain-pipeline.yml"
  push:
    branches: [main]
    paths:
      - "pipelines/benchflow-task-posttrain/**"
      - "docs/training-pipeline.md"
      - "docs/architecture-status.md"
      - "docs/hf-jobs.md"
      - "docs/hf-jobs-validation.md"
      - "docs/opencode-grpo.md"
      - "docs/opencode-grpo-smoke.md"
      - "docs/qwen35-opencode-teacher-canary.md"
      - "docs/qwen35-data-agent-e2e-canary.md"
      - "docs/README.md"
      - "README.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "CODE_OF_CONDUCT.md"
      - ".github/pull_request_template.md"
      - ".github/workflows/benchflow-posttrain-pipeline.yml"

concurrency:
  group: benchflow-posttrain-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package and test dependencies
        run: pip install -e 'pipelines/benchflow-task-posttrain[test]'
      - name: Resolve Linux GPU training stack
        run: |
          python -m pip install uv
          uv pip compile pipelines/benchflow-task-posttrain/pyproject.toml \
            --extra train \
            --python-version 3.12 \
            --python-platform x86_64-manylinux_2_28 \
            --quiet \
            --output-file /tmp/posttrainarena-train-linux.txt
          python - <<'PY'
          import re
          from pathlib import Path

          from packaging.version import Version

          text = Path("/tmp/posttrainarena-train-linux.txt").read_text()

          def version(name):
              match = re.search(rf"^{re.escape(name)}==([^\s]+)", text, re.MULTILINE)
              assert match, name
              return Version(match.group(1))

          assert version("torch").base_version == "2.11.0"
          assert Version("5.6") <= version("transformers") < Version("5.14")
          assert version("trl") == Version("1.8.0")
          # CI checks dependency compatibility without downloading GPU wheels.
          # The GPU bootstrap verifies the installed vLLM metadata is `+cu129`.
          assert version("vllm").base_version == "0.23.0"
          assert Version("0.19") <= version("peft") < Version("0.20")
          PY
      - name: Compile
        run: >-
          python -m py_compile
          pipelines/benchflow-task-posttrain/src/posttrainarena/benchflow_pipeline/*.py
          pipelines/benchflow-task-posttrain/src/posttrainarena/benchflow_pipeline/openenv/*.py
          pipelines/benchflow-task-posttrain/src/posttrainarena/benchflow_pipeline/jobs/*.py
      - name: Test no-spend contracts
        run: python -m pytest pipelines/benchflow-task-posttrain/tests -q
      - name: Exercise documented CLI
        working-directory: pipelines/benchflow-task-posttrain
        run: |
          posttrainarena-train validate --config configs/qwen3-4b-data-agent-smoke.toml
          posttrainarena-train validate \
            --config configs/qwen3-4b-data-agent-forced-grpo-smoke.toml
          posttrainarena-train validate \
            --config configs/qwen3-4b-hf-job-smoke.toml
          posttrainarena-train validate \
            --config configs/qwen3-4b-skillsbench-e2e-smoke.toml
          posttrainarena-train validate \
            --config configs/qwen3.5-9b-data-agent-canary.toml
          posttrainarena-train validate \
            --config configs/qwen3.5-9b-data-agent-soccer-canary.toml
          posttrainarena-train validate \
            --config configs/qwen3.5-9b-data-agent-full.toml
          posttrainarena-train plan \
            --config configs/qwen3.5-9b-data-agent-full.toml \
            --run-name qwen35-full-plan > /tmp/qwen35-full-plan.json
          posttrainarena-train plan \
            --config configs/qwen3-4b-data-agent-forced-grpo-smoke.toml \
            --run-name ci-plan > /tmp/posttrainarena-plan.json
          posttrainarena-train run \
            --config configs/qwen3-4b-data-agent-forced-grpo-smoke.toml \
            --run-name ci-dry-run \
            --dry-run > /tmp/posttrainarena-run.json
          python - <<'PY'
          import json
          from pathlib import Path

          plan = json.loads(Path("/tmp/posttrainarena-plan.json").read_text())
          run = json.loads(Path("/tmp/posttrainarena-run.json").read_text())
          qwen35 = json.loads(Path("/tmp/qwen35-full-plan.json").read_text())
          assert qwen35["model"] == "Qwen/Qwen3.5-9B"
          assert qwen35["train_task_count"] == 2238
          assert qwen35["eval_task_count"] == 366
          assert qwen35["teacher"]["model"] == "openrouter/qwen/qwen3.5-397b-a17b"
          assert qwen35["teacher"]["require_all_tasks"] is True
          assert qwen35["evaluation"]["sync_base_to_vllm"] is True
          assert qwen35["sft"]["num_train_epochs"] == 1.0
          assert qwen35["sft"]["max_steps"] is None
          assert qwen35["grpo"]["num_train_epochs"] == 1.0
          assert qwen35["grpo"]["max_steps"] is None
          assert qwen35["grpo"]["run_policy"] == "always"
          assert plan["train_task_count"] == 15
          assert plan["eval_task_count"] == 2
          assert plan["harness_migration"]["applied_stages"] == [
              "teacher",
              "evaluation",
              "grpo",
          ]
          assert plan["harness_migration"]["pending_stages"] == []
          assert plan["grpo"]["run_policy"] == "always"
          assert run["grpo_run_policy"] == "always"
          assert run["grpo_planned"] is True
          assert run["grpo_ran"] is False
          PY
          posttrainarena-train hf-job-submit \
            --config configs/qwen3-4b-hf-job-smoke.toml \
            --benchmarks configs/multi-benchmark-smoke.toml \
            --bundle-dir /tmp/posttrainarena-job-bundle \
            --run-id ci-job-plan \
            --submission-id organizer-smoke \
            --team-name Organizers \
            --artifact-repo benchflow/posttrainarena-results \
            --leaderboard-repo benchflow/posttrainarena-leaderboard \
            --flavor cpu-basic \
            --pipeline-dry-run \
            --launcher-dry-run > /tmp/posttrainarena-job-plan.json
          python - <<'PY'
          import json
          from pathlib import Path

          plan = json.loads(Path("/tmp/posttrainarena-job-plan.json").read_text())
          assert plan["posttrainarena_ref"]
          assert plan["secret_names"] == ["HF_TOKEN"]
          assert plan["submitted"] is False
          bundle = Path(plan["bundle_dir"])
          assert (bundle / "config.toml").is_file()
          assert (bundle / "benchmarks.toml").is_file()
          PY
