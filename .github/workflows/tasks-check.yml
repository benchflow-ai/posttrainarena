name: tasks-check

# Self-contained validation for starting-kit packages and team
# submissions. No secrets, no private dependencies — fork PRs run the
# exact same checks as everyone else.
#
#  1. structural — scripts/check_task.py (~1s): task.md frontmatter,
#     environment/Dockerfile, verifier/ and oracle/ layout.
#  2. submissions — scripts/check_submission.py: team manifest, track
#     bounds (warn below min until the Phase 2 freeze, fail above max),
#     per-package structure.
#
# Deeper validation — schema, oracle execution, instruction-quality
# screening, the leakage audit — runs in the managed pipeline after a
# PR is opened. Run it locally first with scripts/run_local.sh (docker
# only, no benchflow install).

on:
  pull_request:
    paths:
      - "starting-kit/**"
      - "submissions/**"
      - "scripts/**"
      - ".github/workflows/tasks-check.yml"
  push:
    branches: [main]
    paths:
      - "starting-kit/**"
      - "submissions/**"
      - "scripts/**"
      - ".github/workflows/tasks-check.yml"

concurrency:
  group: tasks-check-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  structural:
    name: structural (self-contained pre-check)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Structural check
        run: python3 scripts/check_task.py

  submissions:
    name: team submission bounds + structure
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate team submissions
        run: python3 scripts/check_submission.py
