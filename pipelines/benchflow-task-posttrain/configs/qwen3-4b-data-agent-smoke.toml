[model]
id = "Qwen/Qwen3-4B"
revision = "1cfa9a7208912126459214e8b04321603b3df60c"

[train_dataset]
repo_id = "benchflow/data_agent_rl_environment_train"
revision = "34ff63c91731df6b3670bfcd7e3d44e6790ddc48"
path = "tasks"
task_list = "../task-lists/data-agent-train-15.txt"

[eval_dataset]
repo_id = "benchflow/data_agent_rl_environment_eval"
revision = "0ea976c79e3248c85737c4f7363484e4d47ce287"
path = "tasks"
task_list = "../task-lists/data-agent-eval-2.txt"

[runtime]
integration = "benchflow"
sandbox = "daytona"
sandbox_user = "agent"
bash_timeout_sec = 120
max_output_chars = 8192
max_completion_length = 2048
max_tool_calling_iterations = 25
num_generations = 2
use_vllm = false

[harness]
agent = "opencode"
skill_mode = "no-skill"
usage_tracking = "required"
concurrency = 1
sandbox_setup_timeout_sec = 300
agent_idle_timeout_sec = 300
agent_timeout_sec = 900

[teacher]
enabled = true
model = "glm/glm-5.1"
max_attempts = 3
min_verified = 15
min_reward = 1.0
max_accepted_total_tokens = 200000
max_accepted_tool_calls = 50

[sft]
enabled = true
max_steps = 40
learning_rate = 0.00002
max_length = 4096
gradient_accumulation_steps = 8
lora_r = 16
lora_alpha = 32

[grpo]
enabled = true
run_policy = "on_reward"
threshold = 0.05
gate_task_count = 4
max_steps = 2
learning_rate = 0.000001
gradient_accumulation_steps = 8

[tracking]
report_to = "wandb"
project = "posttrainarena-benchflow"

[output]
root = "../runs"
