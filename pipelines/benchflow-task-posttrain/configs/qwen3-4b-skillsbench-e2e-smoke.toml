# TRL server mode requires distinct physical CUDA devices for the trainer and
# vLLM worker. A two-GPU smoke can use GPU 0 for this pipeline and GPU 1 for
# `trl vllm-serve`.

[model]
id = "Qwen/Qwen3-4B"
revision = "1cfa9a7208912126459214e8b04321603b3df60c"

[train_dataset]
repo_id = "benchflow/skillsbench"
revision = "be2a6ce2cb1f4ff67ce937307cade0c5a0477a13"
path = ""
task_list = "../task-lists/skillsbench-train-1.txt"

[eval_dataset]
repo_id = "benchflow/skillsbench"
revision = "be2a6ce2cb1f4ff67ce937307cade0c5a0477a13"
path = ""
task_list = "../task-lists/skillsbench-citation-eval-1.txt"

[runtime]
sandbox = "daytona"
sandbox_user = "agent"
max_completion_length = 16384
num_generations = 2

[harness]
agent = "opencode"
skill_mode = "no-skill"
usage_tracking = "required"
concurrency = 1
sandbox_setup_timeout_sec = 300
agent_idle_timeout_sec = 300
agent_timeout_sec = 900

[evaluation]
base_model_env = "BENCHFLOW_BASE_MODEL"
student_model_env = "BENCHFLOW_ADAPTER_MODEL"
base_url_env = "BENCHFLOW_PROVIDER_BASE_URL"
api_key_env = "BENCHFLOW_PROVIDER_API_KEY"

[teacher]
enabled = true
model = "glm/glm-5.1"
max_attempts = 2
min_verified = 1
min_reward = 1.0
max_accepted_total_tokens = 400000
max_accepted_tool_calls = 100

[sft]
enabled = true
max_steps = 1
learning_rate = 0.00002
max_length = 40960
gradient_accumulation_steps = 1
lora_r = 16
lora_alpha = 32

[grpo]
enabled = true
run_policy = "always"
threshold = 0.0
gate_task_count = 1
max_steps = 1
learning_rate = 0.000001
gradient_accumulation_steps = 1
rollout_attempts = 2
vllm_server_base_url_env = "TRL_VLLM_SERVER_BASE_URL"

[tracking]
report_to = "none"
project = "posttrainarena-skillsbench-e2e"

[output]
root = "../runs"
